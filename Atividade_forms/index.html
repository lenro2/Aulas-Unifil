<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criança Feliz</title>
</head>

<body>
    <h1>Cadastro da criança</h1>
    <form>
        <label for="nome">Nome: </label>
        <input type="text" name="nome" id="nome" placeholder="Ex: Marcos" required>

        <label for="date">Dia de nascimento</label>
        <input type="date" name="date" id="date" required>

        <label for="idade">Idade: </label>
        <input type="number" name="idade" id="idade" required>

        <label for="raca">Raça: </label>
        <select name="raca" id="raca" required>
            <option>Branco</option>
            <option>Pardo</option>
            <option>Preto</option>
            <option>Amarelo</option>
        </select>

        <label for="nome-mae">Nome da mãe: </label>
        <input type="text" name="nome-mae" id="nome-mae" required>

        <label for="nome-pai">Nome da pai: </label>
        <input type="text" name="nome-pai" id="nome-pai">

        <label for="cidade">Cidade de nascimento: </label>
        <select name="cidade" id="cidade" required>
            <option>Londrina</option>
            <option>Cambé</option>
            <option>Apucarána</option>
        </select>
        <label for="sexo">Sexo: </label>
        <input type="radio" name="sexo" required>Masculino
        <input type="radio" name="sexo" required>Feminino
        <input type="radio" name="sexo" required>Outros

        <label>
            <input type="checkbox" name="termos" id="termos" required>
            Aceitar termos
        </label>

        <label>Motivo do acolhimento</label>
        <textarea rows="4" required></textarea>

        <button type="submit">Cadastrar criança</button>
    </form>
</body>

</html>
